<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!--
    Zyrbit App Icon — Execution 2: Accent Container
    Navy-black background (#121214) with subtle radial ambient gradient
    New split logo: 85% white body, 15% cyan accent (right Z element)
    No particles, no orbit rings, no glow explosion — clean and premium
  -->
  <defs>
    <!-- Very subtle ambient — NOT a glow explosion -->
    <radialGradient id="ambient" cx="50%" cy="38%" r="52%">
      <stop offset="0%"   stop-color="#5EE6F5" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#121214" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="#121214"/>
  <!-- Ambient wash — minimal -->
  <rect width="1024" height="1024" rx="220" fill="url(#ambient)"/>

  <!-- Zyrbit mark — centered, ~480x384 in 1024x1024 -->
  <!-- Offset: x=(1024-480)/2=272, y=(1024-384)/2=320 -->
  <!-- Scale factor = 12 (since viewBox of inner SVG is 40x32, 40*12=480, 32*12=384) -->
  <g transform="translate(272, 320) scale(12)">
    <!-- Bottom-left wedge slash: white -->
    <polygon points="15.48,16.23 0,32 8.17,32 15.91,16.23" fill="#FFFFFF"/>
    <!-- Middle small wedge slash: white -->
    <polygon points="19.35,9.92 17.2,14.42 21.51,9.92" fill="#FFFFFF"/>
    <!-- Top-right Z-like shape: white -->
    <polygon points="31.83,0 22.37,9.46 27.96,9.92 18.49,22.08 35.7,22.08 37.85,15.32 27.53,14.42 40,0" fill="#FFFFFF"/>
  </g>
</svg>
